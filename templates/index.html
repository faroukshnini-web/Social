                 {% extends "base.html" %}

{% block title %}الرئيسية - منصتي الاجتماعية{% endblock %}

{% block content %}
    <!-- رأس الصفحة مع ترحيب -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="color: #667eea;">أحدث الفيديوهات</h1>
        {% if current_user.is_authenticated %}
            <a href="/upload" class="btn" style="padding: 8px 15px;">
                <i class="fas fa-plus"></i> إضافة فيديو
            </a>
        {% endif %}
    </div>

    <!-- قائمة الفيديوهات -->
    <div class="video-grid" style="display: flex; flex-direction: column; gap: 20px;">
        {% for video in videos %}
            <div class="card" style="padding: 0; overflow: hidden;">
                <!-- معلومات صاحب الفيديو -->
                <div style="display: flex; align-items: center; gap: 10px; padding: 15px;">
                    <div class="avatar" style="width: 40px; height: 40px; font-size: 18px;">
                        {{ video.author.username[0]|upper }}
                    </div>
                    <div style="flex: 1;">
                        <div class="username">{{ video.author.username }}</div>
                        <div style="color: #999; font-size: 12px;">
                            {{ video.created_at.strftime('%Y-%m-%d') }}
                        </div>
                    </div>
                    {% if current_user.is_authenticated and current_user.id != video.author.id %}
                        <a href="/follow/{{ video.author.username }}" class="btn" style="padding: 5px 15px; font-size: 14px;">
                            {% if current_user in video.author.followers|map(attribute='follower')|list %}
                                إلغاء المتابعة
                            {% else %}
                                متابعة
                            {% endif %}
                        </a>
                    {% endif %}
                </div>

                <!-- الفيديو -->
                <div class="video-container">
                    <video src="/uploads/{{ video.filename }}" 
                           onclick="window.location.href='/video/{{ video.id }}'"
                           style="cursor: pointer; width: 100%;"></video>
                </div>

                <!-- عنوان الفيديو -->
                <div style="padding: 15px 15px 10px 15px;">
                    <div class="video-title">{{ video.title }}</div>
                    <div style="color: #666; font-size: 14px; margin: 5px 0;">
                        {{ video.description or 'لا يوجد وصف' }}
                    </div>
                </div>

                <!-- إحصائيات الفيديو -->
                <div style="display: flex; gap: 20px; padding: 0 15px 15px 15px;">
                    <div class="meta-item">
                        <i class="fas fa-heart {% if current_user.is_authenticated and current_user in video.likes|map(attribute='user')|list %}liked{% endif %}"></i>
                        <span>{{ video.likes|length }}</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-comment"></i>
                        <span>{{ video.comments|length }}</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-eye"></i>
                        <span>{{ video.views }}</span>
                    </div>
                </div>
            </div>
        {% else %}
            <div class="card" style="text-align: center; padding: 50px;">
                <i class="fas fa-video" style="font-size: 60px; color: #ddd; margin-bottom: 20px;"></i>
                <h3 style="color: #666;">لا توجد فيديوهات بعد</h3>
                <p style="color: #999;">كن أول من يرفع فيديو!</p>
                {% if current_user.is_authenticated %}
                    <a href="/upload" class="btn" style="margin-top: 20px;">رفع فيديو</a>
                {% else %}
                    <a href="/login" class="btn" style="margin-top: 20px;">تسجيل دخول</a>
                {% endif %}
            </div>
        {% endfor %}
    </div>
{% endblock %}
