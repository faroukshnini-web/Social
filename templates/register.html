{% extends "base.html" %}

{% block title %}إنشاء حساب{% endblock %}

{% block content %}
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">إنشاء حساب جديد</h2>
        
        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem;">اسم المستخدم:</label>
                <input type="text" name="username" required 
                       style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem;">البريد الإلكتروني:</label>
                <input type="email" name="email" required 
                       style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem;">كلمة المرور:</label>
                <input type="password" name="password" required 
                       style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">إنشاء حساب</button>
        </form>
        
        <p style="margin-top: 1rem; text-align: center;">
            لديك حساب بالفعل؟ <a href="/login" style="color: #667eea;">تسجيل دخول</a>
        </p>
    </div>
{% endblock %}
